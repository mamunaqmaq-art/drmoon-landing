<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DrMoon Automation</title>
</head>
<body>

  <h1>Automation Services</h1>
  <p>I build workflow automation systems using n8n.</p>

  <h2>Contact Me</h2>

  <form id="leadForm">
    <input type="text" id="name" placeholder="Name" required><br><br>
    <input type="email" id="email" placeholder="Email" required><br><br>
    <textarea id="message" placeholder="Message" required></textarea><br><br>
    <button type="submit">Send</button>
  </form>

  <p id="status"></p>

  <script>
    document.getElementById("leadForm").addEventListener("submit", async function(e){
      e.preventDefault();

      const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
      };

      await fetch("https://n8n.drmoon.xyz/webhook/lead", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify(data)
      });

      document.getElementById("status").innerText = "Message sent successfully!";
    });
  </script>

</body>
</html>
